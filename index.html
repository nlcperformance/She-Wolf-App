            }
            .page-break { break-after: page; page-break-after: always; }
            .no-print { display: none !important; }
        }

        .print-box { 
            width: 14px; 
            height: 14px; 
            border: 2px solid black; 
            display: inline-block; 
            background: white; 
        }

        function getHeaderHTML() {

        function getTrackerHTML(data) {
            const monthsList = ['SEP', 'OCT', 'NOV', 'DEC', 'JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG'];
            const daysList = ['M', 'T', 'W', 'TH', 'F', 'S', 'SU'];

            const monthsHTML = monthsList.map(m => {
                const isCurrent = data.months.includes(m);
                return `
                    <label class="flex items-center gap-1 text-[8px] font-bold text-black">
                        <span class="w-3 h-3 border border-black inline-flex items-center justify-center font-bold text-[9px] ${isCurrent ? 'bg-gray-200' : 'bg-white'}">
                            ${isCurrent ? '&#10003;' : ''}
                        </span> ${m}
                    </label>
                `;
            }).join('');

            const daysHTML = daysList.map(d => `
                <label class="flex items-center gap-1 text-[10px] font-black text-black">
                    <span class="w-3 h-3 border border-gray-400 inline-block bg-white"></span> ${d}
                </label>
            `).join('');

            return `
            <div class="grid grid-cols-12 gap-3 mb-4">
                <div class="col-span-3 bg-white border-[3px] border-black p-3 rounded-lg shadow-sm relative overflow-hidden flex flex-col justify-center">

                    <td class="p-2 text-center border-r border-black font-black text-black text-xs align-middle">${ex.rpe}</td>
                    <td class="p-2 text-center border-r border-black font-bold text-black text-[11px] align-middle">

                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>
                        <td class="p-2 border-r border-black"></td>

                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Feeling Good
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Okay, but sore
                        </label>
                        <label class="flex items-center gap-2 text-[10px] font-bold text-black leading-none">
                            <span class="w-3.5 h-3.5 border-2 border-black inline-block"></span> Broken (See Coach)
                        </label>
                    </div>
                </div>
            </div>
            `;
        }

        // --- RENDER APPLICATION ---
        function renderPrintouts() {
            const container = document.getElementById('root');
            
            const introHTML = `
                <div class="no-print bg-gray-900 text-white p-6 text-center mb-8 border-b-4 border-[#D00000]">
                    <h2 class="text-2xl font-brand uppercase tracking-widest mb-1">Newman Strong V2.2 Database</h2>
                    <p class="text-sm text-gray-400 mb-4">She-Wolf Protocol Printouts (3 Blocks: Jun/Jul, Aug, Sep/Oct) | Press CMD+P to print.</p>
                    <button onclick="window.print()" class="bg-[#D00000] hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition tracking-widest uppercase text-sm">
                        Print Protocol Book
                    </button>
                </div>
            `;

            const pagesHTML = WOLFPACK_DATA.map(block => {
                return block.sessions.map(session => `
                    <div class="print-container page-break relative w-full max-w-[1100px] mx-auto bg-white p-4 md:p-8 mb-8 shadow-xl border-t-[10px] border-black box-border flex flex-col justify-between" style="height: auto; min-height: 19cm">
                        <div>
                            ${getHeaderHTML()}
                            ${getTrackerHTML(block)}
                            ${getWarmupHTML()}
                            
                            <div class="flex items-center gap-3 mb-2 border-b-2 border-[#D00000] pb-1 mt-4">
                                <h2 class="font-brand text-2xl text-black uppercase leading-none">${session.day} <span class="text-gray-300 mx-1">|</span> <span class="text-[#D00000]">${session.title}</span></h2>
                            </div>
                            <p class="text-gray-700 font-bold text-[11px] mb-3 italic">${session.subtitle}</p>

                            ${getTableHTML(session.exercises)}
                        </div>
                        ${getFooterHTML()}
                    </div>
                `).join('');
            }).join('');

            container.innerHTML = `
                <div class="pb-10 bg-gray-100">
                    ${introHTML}
                    ${pagesHTML}
                </div>
            `;
        }

        window.onload = renderPrintouts;
    </script>
</body>
</html>
